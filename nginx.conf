server {
  listen 80;

  gzip on;
  gzip_vary on;
  gzip_comp_level 6;
  gzip_min_length 256;

  gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        application/x-javascript
        text/xml
        application/xml
        application/xml+rss
        text/javascript
        application/vnd.ms-fontobject
        application/x-font-ttf
        font/opentype
        image/svg+xml
        image/x-icon
        application/octet-stream;

  # This block matches only the exact / URI and disables caching for it.
  location = / {
    root /usr/share/nginx/html;
    index index.html index.htm;
    add_header Cache-Control "no-cache, must-revalidate, proxy-revalidate";
    try_files $uri $uri/ /index.html =404;
  }

  # This block matches any / URI with GET parameters and disables caching for it.
  location ~ ^/\?.+$ {
    root /usr/share/nginx/html;
    add_header Cache-Control "no-cache, must-revalidate, proxy-revalidate";
    try_files $uri $uri/ /index.html =404;
  }

  location / {
    root /usr/share/nginx/html;
    index index.html index.htm;
    try_files $uri $uri/ /index.html =404;
  }

  include /etc/nginx/extra-conf.d/*.conf;
}